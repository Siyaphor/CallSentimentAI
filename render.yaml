services:
  - type: web
    name: voiceiq
    runtime: python
    buildCommand: apt-get install -y ffmpeg && pip install -r requirements.txt && python -c "from faster_whisper import WhisperModel; WhisperModel('tiny', device='cpu', compute_type='int8')"
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    plan: free